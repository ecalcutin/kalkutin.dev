version: "3.8"
services:
  nginx:
    image: jonasal/nginx-certbot:latest
    restart: unless-stopped
    environment:
      - CERTBOT_EMAIL
      - RENEWAL_INTERVAL
      - DEBUG
    env_file:
      - ./certbot.env
    ports:
      - 80:80
      - 443:443
    volumes:
      - letsencrypt:/etc/letsencrypt
      - ./nginx:/etc/nginx/user_conf.d

  website:
    image: ecalcutin/kalkutin.dev-website
    restart: always
    ports:
      - 8080:80

volumes:
  letsencrypt:
